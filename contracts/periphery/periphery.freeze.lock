## FeesRouter

- **ABI:** `backend/deployments/abis/FeesRouter.json` (impl)
       and `backend/deployments/abis/IFeesRouter.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#FeesRouter_proxy` —
  `0xebf10213e58cc694aFDd06848faa363b41395898`
- **Address impl:** `paxeer-network-addresses.json#FeesRouter_impl` —
  `0x165F4992E12FC91EADBF9Dd6927ab330B5E2924d`
- **Pattern:** UUPS proxy + ReentrancyGuard. Holds `FEES_ROUTER_ROLE` on
  FeeAccumulator and `STRATEGY_SETTER_ROLE` on SidioraNFT.

### Functions

External (writes — NFT-owner gated unless noted):
- `setFeeStrategy(nftId, newStrategy)` — caller must own NFT.
  Calls `SidioraNFT.setFeeStrategy(nftId, newStrategy)`. Strategy must be 0–3.
- `claimFees(nftId)` → `amount` — strategy must be 0 (CLAIM). Routes USDL
  fees from FeeAccumulator to caller.
- `executeBurn(nftId)` → `amount` — strategy 1 (BURN). Sends USDL fees to
  `DEAD_ADDRESS`.
- `executeAirdrop(nftId)` → `amount` — strategy 2. Snapshots fees as a new
  airdrop epoch. Token holders then call `claimAirdrop` individually.
- `claimAirdrop(nftId)` → `amount` — OPEN (no NFT ownership check). Caller's
  pro-rata share of the current epoch is sent to caller. One claim per
  (nftId, holder, epoch).
- `executeLpRewards(nftId)` → `amount` — strategy 3. Sends USDL fees back
  to pool reserves and triggers `pool.syncReserves()` to reflect the
  inflow in pool state.

Admin:
- `initialize(nftContract, feeAccumulator, poolRegistry, admin)`
- UUPS `_authorizeUpgrade`

Views:
- `nftContract()`, `feeAccumulator()`, `poolRegistry()`

### Events to index (LOCAL — pair with `IEventEmitter.FeeDistributed`)
- `FeeStrategyChanged(nftId, oldStrategy, newStrategy)` — local;
  ALSO emitted via `IEventEmitter.FeeStrategyChanged` from SidioraNFT path.
  Indexer should prefer the EventEmitter copy (carries `poolId`).
- `FeesClaimed(nftId, recipient, amount)`
- `FeesBurned(nftId, amount)`
- `AirdropExecuted(nftId, amount)` — pair with `FeeAccumulator.AirdropTriggered`
- `AirdropClaimed(nftId, recipient, amount)` — pair with `FeeAccumulator.AirdropClaimed`
- `LpRewardsExecuted(nftId, amount)` — pair with `FeeAccumulator.LpRewardsSent`
  AND a subsequent `EventEmitter.PoolStateUpdated` from `pool.syncReserves()`.

### Reads
- `SidioraNFT.{ownerOf, getFeeStrategy, getPoolAddress}` (via the public
  ABI; for `ownerOf` it staticcalls because `_requireNftOwner` uses raw
  `staticcall` rather than direct interface to avoid revert proxying)

### Writes
- `SidioraNFT.setFeeStrategy`
- `FeeAccumulator.{claim, burn, triggerAirdrop, claimAirdrop, sendLpRewards}`
- `SidioraPool.syncReserves` (LP rewards path only)

### Indexer notes
- The strategy-execution path produces a CHAIN of events that should be
  joined by `txHash`:
  - CLAIM: `FeesRouter.FeesClaimed` + `FeeAccumulator.FeesClaimed` +
    `EventEmitter.FeeDistributed(strategy=0)`
  - BURN: `FeesRouter.FeesBurned` + `FeeAccumulator.FeesBurned` +
    `EventEmitter.FeeDistributed(strategy=1)`
  - AIRDROP TRIGGER: `FeesRouter.AirdropExecuted` +
    `FeeAccumulator.AirdropTriggered`
  - AIRDROP CLAIM (per-holder): `FeesRouter.AirdropClaimed` +
    `FeeAccumulator.AirdropClaimed` +
    `EventEmitter.FeeDistributed(strategy=2, recipient=holder)`
  - LP REWARDS: `FeesRouter.LpRewardsExecuted` +
    `FeeAccumulator.LpRewardsSent` +
    `EventEmitter.PoolStateUpdated` (post-syncReserves) +
    `EventEmitter.FeeDistributed(strategy=3, recipient=pool)`
  Use the EventEmitter `FeeDistributed` events as the primary index;
  the local events are useful for joining nftId ↔ poolId relationships.
- `claimAirdrop` is the ONLY function that does NOT require NFT ownership.
  Subscribe to it with `recipient` indexed for "user airdrop history" UI.


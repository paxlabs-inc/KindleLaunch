## Router

- **ABI:** `backend/deployments/abis/Router.json` (impl)
       and `backend/deployments/abis/IRouter.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#Router_proxy` —
  `0xB2D63300FE8b3508A83728e8f36B98e845eBD980`
- **Address impl:** `paxeer-network-addresses.json#Router_impl` —
  `0xb35eaa8E113910c8A7179C7c8e062c7Be28847A1`
- **Prev impl:** `paxeer-network-addresses.json#Router_impl_prev`
- **Pattern:** UUPS proxy + ReentrancyGuard + Multicall. Holds
  `ROUTER_ROLE` on `SidioraFactory_proxy` for `createMarketFor`.

### Functions

External (writes — user entrypoints):

Core:
- `createMarket(name, symbol, feeStrategy, optical)` → `(token, pool, nftId)` —
  pulls `creationFee` USDL from caller to Treasury, then calls
  `Factory.createMarketFor(msg.sender, ...)`.
- `buy(pool, usdlAmountIn, minTokensOut, deadline)` → `amountOut` — pulls
  USDL from caller to pool, calls `pool.swap(... isBuy=true ..., recipient=caller)`.
- `sell(pool, tokenAmountIn, minUsdlOut, deadline)` → `amountOut` — pulls
  pool's bonded token from caller to pool, calls `pool.swap(... isBuy=false ..., recipient=caller)`.
- `swapTokenForToken(tokenIn, tokenOut, amountIn, minAmountOut, deadline)` →
  `(amountOut, intermediateUsdl)` — atomic Token A→USDL→Token B multihop.
  Router itself is the intermediate USDL recipient between legs.

Permit variants (EIP-2612 — Router calls `permit()` first, then proceeds;
permit failure is silently swallowed and downstream allowance check governs):
- `buyWithPermit(pool, usdlAmountIn, minTokensOut, deadline, PermitParams)`
- `sellWithPermit(pool, tokenAmountIn, minUsdlOut, deadline, PermitParams)`
- `swapTokenForTokenWithPermit(tokenIn, tokenOut, amountIn, minAmountOut, deadline, PermitParams)`
- `createMarketWithPermit(name, symbol, feeStrategy, optical, PermitParams)`

Multicall (inherited from `base/Multicall.sol`):
- `multicall(bytes[] data) returns (bytes[])` — atomic batching of any of
  the above calls. Used e.g. for "create market + buy initial bag" in one tx.

Admin:
- `initialize(factory, poolRegistry, protocolConfig, usdl, admin)`
- UUPS `_authorizeUpgrade`

Views (storage exposures):
- `factory()`, `poolRegistry()`, `protocolConfig()`, `usdlAddress()`

### Events to index (LOCAL — these duplicate the EventEmitter Swap pair-wise)
- `MarketCreated(tokenAddr, poolAddr, creator, nftId)` — local
- `Buy(pool, sender, amountIn, amountOut)` — local; pair with EventEmitter `Swap(isBuy=true)`
- `Sell(pool, sender, amountIn, amountOut)` — local; pair with EventEmitter `Swap(isBuy=false)`
- `MultihopSwap(sender, tokenIn, tokenOut, amountIn, intermediateUsdl, amountOut)` —
  THE canonical multihop signal. NO single `EventEmitter` event captures
  the multihop atomicity — it shows up as TWO sequential `Swap` events on
  poolA (sell) then poolB (buy) with `Router_proxy` as the recipient on
  the first leg and the user as recipient on the second.

### Reads (per call)
- `IProtocolConfig.creationFee` (createMarket path)
- `IPoolRegistry.{getPoolByToken, isRegisteredPool}`
- `ISidioraPool.{tokenAddress, swap}`
- `ISidioraFactory.{treasury, createMarketFor}`
- ERC20 `permit` (best-effort), `transferFrom`, `transfer`

### Writes (per call)
- ERC20 `safeTransferFrom` (caller → pool/treasury)
- ERC20 `safeTransfer` (Router → poolB on multihop leg-2)
- Calls into `pool.swap()` which mutates pool reserves
- Calls into `Factory.createMarketFor` which deploys new contracts

### Indexer notes
- For the `indexer.swaps` table, use the `EventEmitter.Swap` event as
  truth, not the local `Buy/Sell/MultihopSwap` events — the EventEmitter
  copy carries `block.timestamp`/`number` salting and is uniformly emitted
  whether the swap originated from Router OR from MetaAGRouter via
  SidioraAdapter.
- `MultihopSwap` is the ONLY way to identify multihop intent at the data
  layer. Without it, the indexer must heuristically pair sequential Swap
  events with `recipient=Router_proxy` on the sell leg — which is fragile.
  PRIORITY: subscribe to `MultihopSwap` and join with `Swap` by `txHash`.
- The permit pattern's silent failure (`(success); // Silence unused warning`)
  is intentional anti-griefing. The downstream `safeTransferFrom` is the
  authoritative allowance check. Off-chain UX should NOT report "permit
  succeeded" based on Router-side logs — there are none.


## Quoter

- **ABI:** `backend/deployments/abis/Quoter.json` (impl)
       and `backend/deployments/abis/IQuoter.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#Quoter_proxy` —
  `0xeDb3B45E320A8ab2306Fa1C303742f2478fd3E0a`
- **Address impl:** `paxeer-network-addresses.json#Quoter_impl` —
  `0x0cb1B2fb940a7875de03D812eD0B3b9538E25e24`
- **Prev impl:** `paxeer-network-addresses.json#Quoter_impl_prev`
- **Last upgrade:** `paxeer-network-addresses.json#_meta.lastUpgrade` records
  the most recent Quoter upgrade (`2026-04-02T13:41:36.611Z`)
- **Pattern:** UUPS proxy. Read-only — no state changes; no events emitted.

### Functions

All view / pure / staticcall-safe:
- `quoteExactInput(pool, amountIn, isBuy)` → `QuoteResult{amountOut, feeAmount, priceImpactBps}`
- `quoteMultihop(tokenIn, tokenOut, amountIn)` →
  `MultihopQuoteResult{poolA, poolB, intermediateUsdl, amountOut, sellFeeAmount,
   buyFeeAmount, sellPriceImpactBps, buyPriceImpactBps, combinedPriceImpactBps}`
- `getPoolPrice(pool)` → `uint256`
- `getPoolStats(pool)` → `PoolStats{virtualUsdl, realUsdl, tokenReserve, cumulativeVolume,
   currentFeeBps, poolAge, price, marketCap}`
- `getMarketCap(pool)` → `uint256`
- `getAllPools(offset, limit)` → `address[]` (delegates to PoolRegistry)
- `getPoolsByCreator(creator)` → `address[]` (delegates to PoolRegistry)

Admin:
- `initialize(poolRegistry, protocolConfig, admin)`
- UUPS `_authorizeUpgrade`

Views (storage):
- `poolRegistry()`, `protocolConfig()`

### Events to index
- NONE. Quoter is pure-view. All access is via off-chain `eth_call` or
  staticcall from on-chain consumers.

### Reads
- `IProtocolConfig` parameters for `_calculateFee`
- `ISidioraPool.{getReserves, getPriceSnapshots, cumulativeVolume,
   creationTimestamp, getPrice, tokenAddress}`
- `IPoolRegistry.{getPoolByToken, getAllPools, getPoolsByCreator}`
- ERC20 `totalSupply` (for market cap)

### Writes
- NONE.

### Indexer notes
- Quoter is a CONVENIENCE LAYER for the frontend / off-chain services. The
  same numbers are derivable from raw `IEventEmitter` events + chain state
  reads. The indexer SHOULD NOT call Quoter on the hot path — prefer
  reconstructing fee/marketcap locally from `Swap` events + cached pool
  state (faster, no RPC dependency).
- `quoteMultihop` price-impact computation is ADDITIVE-approximate
  (`sellPriceImpactBps + buyPriceImpactBps`). For UI accuracy on large
  trades, compute it natively from the predicted leg-2 reserves. Surface
  `combinedPriceImpactBps` as "estimated" not "exact".


## SidioraFactory

- **ABI:** `backend/deployments/abis/SidioraFactory.json`
- **Address proxy:** `paxeer-network-addresses.json#SidioraFactory_proxy` —
  `0x322170E27d0c5Bd252337791fadED31dc4E85cA6`
- **Address impl:** `paxeer-network-addresses.json#SidioraFactory_impl` —
  `0x6E33eb03b59b5Eac5D5db3519db221FB754fc97d`
- **Prev impl:** `paxeer-network-addresses.json#SidioraFactory_impl_prev`
- **Pattern:** UUPS proxy. `DEFAULT_ADMIN_ROLE` = Timelock. `ROUTER_ROLE`
  granted to `Router_proxy` for `createMarketFor`.

### Functions

External (writes):
- `initialize(beacon, nft, registry, eventEmitter, protocolConfig, treasury, feeAccumulator, usdl, admin)` — one-shot
- `createMarket(name, symbol, feeStrategy, optical)` → `(token, pool, nftId)` — charges `creationFee` (USDL) from caller
- `createMarketFor(creator, name, symbol, feeStrategy, optical)` — `ROUTER_ROLE` only; no fee charge (Router already pulled it)

Admin (`DEFAULT_ADMIN_ROLE` / Timelock):
- UUPS `_authorizeUpgrade`

Views:
- `poolBeacon()`, `nftContract()`, `poolRegistry()`, `eventEmitter()`,
  `protocolConfig()`, `treasury()`, `feeAccumulator()`, `usdlAddress()`
- `getNonce(creator)` — per-creator CREATE2 salt nonce

### Events to index
- `MarketCreated(tokenAddr, poolAddr, creator, nftId, optical)` — local event
  in addition to `IEventEmitter.MarketCreated` (the indexer SHOULD prefer the
  EventEmitter copy because that one is salted with `block.timestamp` and
  `block.number`).

### Reads (cross-contract)
- `IProtocolConfig.creationFee / virtualUsdlDefault / virtualTokenDefault`
- `IPoolRegistry` via `register()` write
- `ISidioraNFT.mint`
- `IFeeAccumulator.authorizePool` (grants `POOL_ROLE` to the new pool)

### Writes
- Deploys new `SidioraERC20` via CREATE2 (salt = keccak256(creator,name,symbol,nonce))
- Deploys new `BeaconProxyDeployer` (pool proxy) via CREATE2 (salt = keccak256(token))
- Increments `_nonces[creator]`
- `IEventEmitter.emitMarketCreated`

### Indexer notes
- `MarketCreated` is the canonical "new pool" signal. Use the indexed
  `tokenAddr` to dedupe; CREATE2 salt is deterministic given creator+name+symbol+nonce.
- The pool address is also derivable from `keccak256(token)` salt + beacon proxy
  init bytecode — useful for back-filling against historical block ranges.


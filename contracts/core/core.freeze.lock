## PoolBeacon

- **ABI:** `backend/deployments/abis/PoolBeacon.json`
- **Address:** `paxeer-network-addresses.json#PoolBeacon` —
  `0xe769859e5a9AEd339931E2717AF00606fA0e847f`
- **Pattern:** Bare `UpgradeableBeacon` (constructor-only, no proxy). Owner =
  Timelock at deploy time.

### Functions
- `implementation()` → `address` — currently
  `paxeer-network-addresses.json#SidioraPool_impl`
- `upgradeTo(newImplementation)` — owner only (Timelock-queued)
- `transferOwnership(newOwner)` / `renounceOwnership()`

### Events to index
- `Upgraded(implementation)` — atomic upgrade for ALL pools. CRITICAL signal
  for indexer/frontend cache invalidation: the entire pool semantics may have
  shifted (storage layout, event ABIs).
- `OwnershipTransferred(previousOwner, newOwner)`

### Indexer notes
- Listening to `Upgraded` is the only way to know "every pool now runs new
  bytecode". Not safe to assume the live contract behavior matches the ABI in
  `backend/deployments/abis/SidioraPool.json` after an `Upgraded` event without
  re-fetching that ABI for the new impl.


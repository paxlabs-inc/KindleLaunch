## SidioraERC20

- **ABI:** `backend/deployments/abis/SidioraERC20.json`
- **Address:** NOT in `paxeer-network-addresses.json` — one ERC20 per pool,
  CREATE2-derived, discovered via Factory `MarketCreated` event.
- **Pattern:** Immutable, non-upgradeable. Constructor mints `_totalSupply` to
  `_recipient` (always the new pool). 6 decimals (USDL parity).

### Functions
- Standard ERC20: `transfer`, `transferFrom`, `approve`, `allowance`,
  `balanceOf`, `totalSupply`, `name`, `symbol`, `decimals`
- EIP-2612 permit (verify in `ERC20Base` — Router uses `permit(owner,spender,value,deadline,v,r,s)`)

### Events to index
- ERC20 `Transfer(from, to, value)` — for holder counts and balance snapshots
- ERC20 `Approval(owner, spender, value)`

### Indexer notes
- `decimals == 6`. Total supply is `IProtocolConfig.virtualTokenDefault()` at
  market creation time (currently `1_000_000_000e6` = 1B with 6 decimals).
- No mint/burn after constructor. `Transfer(from=0)` only fires once at creation
  (mint to pool); `Transfer(to=0)` never fires under normal operation but COULD
  if a user manually transfers to address(0) — track for unique holder count.


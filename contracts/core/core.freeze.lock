- **Pattern:** UUPS ERC721Enumerable. `MINTER_ROLE` granted to Factory.

### Functions

External (writes):
- `initialize(name, symbol, eventEmitter, admin)` — one-shot
- `mint(to, pool, strategy)` → `tokenId` — `MINTER_ROLE` only (Factory)
- `setFeeStrategy(tokenId, newStrategy)` — token-owner / approved /
  `STRATEGY_SETTER_ROLE` (FeesRouter)

Standard ERC721:
- `transferFrom`, `safeTransferFrom`, `approve`, `setApprovalForAll`,
  `getApproved`, `isApprovedForAll`, `balanceOf`, `ownerOf`,
  `tokenOfOwnerByIndex`, `tokenByIndex`, `totalSupply`, `name`, `symbol`,
  `tokenURI` (likely base + tokenId; verify off-chain)

Views:
- `nextTokenId()`, `getFeeStrategy(tokenId)`, `getPoolAddress(tokenId)`
- `supportsInterface(bytes4)`

### Events to index
- ERC721 `Transfer(from, to, tokenId)` — ownership changes (NFT marketplace,
  fees claim authority transfer)
- ERC721 `Approval`, `ApprovalForAll`
- `PoolNFTMinted(tokenId, owner, pool)` — local event (also pair with
  `MarketCreated` from Factory by `nftId`)
- `FeeStrategyChanged(tokenId, oldStrategy, newStrategy)` — local; the same
  signal is also emitted via `IEventEmitter.FeeStrategyChanged` from
  `FeesRouter.setFeeStrategy`. Indexer should prefer the EventEmitter copy
  for poolId association.

### Reads / Writes
- Reads: `_isApprovedOrOwner` for strategy changes
- Writes: `_feeStrategy[tokenId]`, `_poolAddress[tokenId]`, ERC721 ownership

### Indexer notes
- Strategy enum: `0 = CLAIM`, `1 = BURN`, `2 = AIRDROP`, `3 = LP_REWARDS`. Any
  `newStrategy > 3` reverts.
- Pair `tokenId` ↔ `pool` is fixed at mint and never changes. Cache it.


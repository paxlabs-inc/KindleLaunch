## SidioraPool (AMM engine — beacon-proxy instances)

- **ABI:** `backend/deployments/abis/SidioraPool.json`
- **Implementation address:** `paxeer-network-addresses.json#SidioraPool_impl` —
  `0xDc84Cdf2D2553FDa2aCa8741409Cb5AB5b7c0942`
- **Beacon address:** `paxeer-network-addresses.json#PoolBeacon` —
  `0xe769859e5a9AEd339931E2717AF00606fA0e847f`
- **Per-pool addresses:** discovered dynamically via `IPoolRegistry.getAllPools()`
  and `MarketCreated` events. NOT in `paxeer-network-addresses.json`.
- **Pattern:** BeaconProxy. Initialized once by Factory. `guardian` (creator) can
  pause/unpause; no per-pool admin role beyond that.

### Functions

External (writes):
- `initialize(token, usdl, optical, feeAccumulator, eventEmitter, protocolConfig, guardian, virtualUsdlReserve, tokenReserve)` — one-shot
- `swap(amountIn, minAmountOut, isBuy, recipient, deadline)` → `amountOut` —
  the only swap entry-point. Buys (USDL→Token) charge fee in USDL routed to
  FeeAccumulator. Sells (Token→USDL) charge fee in Token, retained in pool.
- `syncReserves()` → `(usdlBal, tokenBal)` — anyone can call; reconciles
  `realUsdlBalance` and `tokenReserve` against actual ERC20 balances. Used by
  FeesRouter after `executeLpRewards`.
- `pause()` / `unpause()` — guardian-only

Views:
- `getReserves()` → `(virtualUsdl, realUsdl, tokenReserve)`
- `getEffectiveReserves()` → `(virtualUsdl + realUsdl, tokenReserve)`
- `getPrice()` — current AMM mid-price (USDL per token, scaled)
- `getPoolInfo()` → `PoolInfo` struct
- `getPriceSnapshots()` → `uint256[8]` ring buffer (used for volatility-driven fees)
- `tokenAddress()`, `usdlAddress()`, `opticalAddress()`, `feeAccumulator()`,
  `eventEmitter()`, `protocolConfig()`, `guardian()`, `creationTimestamp()`,
  `cumulativeVolume()`, `accumulatedUsdlFees()`, `accumulatedTokenFees()`,
  `paused()`

### Events to index (emitted via `IEventEmitter` on every swap)
- `Swap(poolId, sender, isBuy, amountIn, amountOut, fee, price, timestamp, blockNumber)`
- `PoolStateUpdated(poolId, virtualReserve, realReserve, tokenReserve, price, timestamp, blockNumber)`
  — emitted by `syncReserves()`

### Reads (per swap)
- `IProtocolConfig.{baseFeeBps, minFeeBps, maxFeeBps, feeDecayRate, volatilityWeight, concentrationWeight}` for dynamic fee
- `IOpticalMinimal.{getFlags, beforeSwap, afterSwap}` if `opticalAddress != address(0)`
- ERC20 `balanceOf` of self for `_getBalance` in `syncReserves`

### Writes (per swap)
- `tokenReserve`, `realUsdlBalance`, `cumulativeVolume`, `priceSnapshots[snapshotIndex]`
- `accumulatedUsdlFees` (buy-side) or `accumulatedTokenFees` (sell-side)
- ERC20 `transfer` of token-out to `recipient`, USDL `transfer` to `feeAccumulator`
- `IFeeAccumulator.recordFee(pool, feeAmount)` (buy-side only)
- `IEventEmitter.emitSwap` and `emitPoolStateUpdated` (sync only)

### Indexer notes
- `poolId = bytes32(uint256(uint160(poolAddress)))` — use this as the canonical
  primary key in `indexer.pools`. Tokens map 1:1 to pools via Factory.
- Fee is denominated in INPUT token: USDL on buys, the bonded token on sells.
  Sell-side fees accrue inside the pool — there is NO `recordFee` on sells.
- Virtual reserves are pricing-only. `realUsdlBalance` is the upper bound for
  any sell `amountOut`. `VirtualFloorBreached` revert is the canonical signal
  that the pool is illiquid USDL-side.


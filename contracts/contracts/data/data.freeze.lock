## EventEmitter

- **ABI:** `backend/deployments/abis/EventEmitter.json` (impl ABI)
       and `backend/deployments/abis/IEventEmitter.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#EventEmitter_proxy` —
  `0x6679aF411d534de222C32ed0AF94C3BD67090672`
- **Address impl:** `paxeer-network-addresses.json#EventEmitter_impl` —
  `0xC7c0071463ADA653ed1691938a91d2404D2dc694`
- **Prev impl:** `paxeer-network-addresses.json#EventEmitter_impl_prev`
- **Pattern:** UUPS proxy. Authorized callers = `_authorizedEmitters` mapping
  + every pool registered in `PoolRegistry`. Inspired by GMX V2 EventEmitter.

### Functions

External (writes, gated by `onlyAuthorized`):
- `emitMarketCreated(poolId, token, creator, pool, optical)`
- `emitSwap(poolId, sender, isBuy, amountIn, amountOut, fee, price)`
- `emitFeeRecorded(poolId, feeAmount, protocolCut, poolCut)`
- `emitFeeDistributed(poolId, nftId, strategy, amount, recipient)`
- `emitFeeStrategyChanged(poolId, nftId, oldStrategy, newStrategy)`
- `emitPoolStateUpdated(poolId, virtualReserve, realReserve, tokenReserve, price)`
- `emitOpticalExecuted(poolId, optical, hookName, data)`
- `emitConfigUpdated(key, oldValue, newValue)`

Admin (`DEFAULT_ADMIN_ROLE` / Timelock):
- `initialize(admin)`
- `setPoolRegistry(poolRegistry)`
- `setAuthorizedEmitter(emitter, authorized)`
- UUPS `_authorizeUpgrade`

Views:
- `isAuthorizedEmitter(emitter)` → `bool`
- `poolRegistry()` → `address`

### Events to index (this is THE indexer hot-path)

All events carry `block.timestamp` and `block.number` as the trailing two
fields. The indexer should treat `(blockNumber, txIndex, logIndex)` as the
canonical ordering key and `poolId` as the primary partition key.

| Event                    | Indexed args                          | Non-indexed args                                              | Purpose                                       |
| ------------------------ | ------------------------------------- | ------------------------------------------------------------- | --------------------------------------------- |
| `MarketCreated`          | poolId, token, creator                | pool, optical, timestamp, blockNumber                         | New pool registration                         |
| `Swap`                   | poolId, sender, isBuy                 | amountIn, amountOut, fee, price, timestamp, blockNumber       | Every trade. Drives candles, stats, PnL.      |
| `FeeRecorded`            | poolId                                | feeAmount, protocolCut, poolCut, timestamp, blockNumber       | Pool fee accrual                              |
| `FeeDistributed`         | poolId, nftId, recipient              | strategy, amount, timestamp, blockNumber                      | NFT-strategy fee execution (claim/burn/etc.)  |
| `FeeStrategyChanged`     | poolId, nftId                         | oldStrategy, newStrategy, timestamp, blockNumber              | NFT holder switched fee mode                  |
| `PoolStateUpdated`       | poolId                                | virtualReserve, realReserve, tokenReserve, price, ts, blk     | After `syncReserves`                          |
| `OpticalExecuted`        | poolId, optical                       | hookName (string), data (bytes), timestamp, blockNumber       | Generic optical hook invocation               |
| `ConfigUpdated`          | key                                   | oldValue, newValue, timestamp, blockNumber                    | Protocol parameter change                     |

### Reads
- `IPoolRegistry.isRegisteredPool(msg.sender)` on every emit when the caller
  is not in `_authorizedEmitters`. ANY pool registered via Factory is
  auto-authorized — no manual whitelisting needed for new markets.

### Writes
- Only emits log events; no storage writes after init except admin setters
  and UUPS upgrade slots.

### Indexer notes
- Indexer config: subscribe to logs at `EventEmitter_proxy` ONLY. All
  protocol-level events flow through this address. Do NOT additionally
  subscribe to per-pool addresses for Swap/PoolStateUpdated — they emit
  their own local events but the canonical signal is through here with the
  full `block.timestamp/number` salting.
- `optical` field on `MarketCreated` may be `address(0)` (pool created
  without an optical hook). Handle nulls in `indexer.pools.optical` schema.
- `OpticalExecuted.data` is opaque bytes — decoder must dispatch on
  `hookName` string. No standard schema across opticals.


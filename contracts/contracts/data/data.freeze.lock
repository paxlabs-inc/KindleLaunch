## PoolRegistry

- **ABI:** `backend/deployments/abis/PoolRegistry.json` (impl ABI)
       and `backend/deployments/abis/IPoolRegistry.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#PoolRegistry_proxy` —
  `0x1F22f11325197fae71937598F6935cc4e9231970`
- **Address impl:** `paxeer-network-addresses.json#PoolRegistry_impl` —
  `0x779EF19C7Fd0bCA0ec1A29bEfF332197c475ba41`
- **Pattern:** UUPS proxy. `FACTORY_ROLE` granted to `SidioraFactory_proxy`.

### Functions

External (writes):
- `register(pool, token, creator, optical, nftId)` — `FACTORY_ROLE` only.
  Reverts on duplicate token (`DuplicateToken`).

Admin:
- `initialize(eventEmitter, admin)`
- UUPS `_authorizeUpgrade`

Views:
- `getPoolByToken(token)` → `pool`
- `getPoolsByCreator(creator)` → `address[]`
- `getNftIdByPool(pool)` → `uint256`
- `getPoolMetadata(pool)` → `PoolMetadata{ creator, token, optical, nftId, createdAt, createdBlock }`
- `getAllPools(offset, limit)` → `address[]`
- `getPoolCount()` → `uint256`
- `isRegisteredPool(pool)` → `bool`
- `eventEmitter()` → `address`

### Events to index
- `PoolRegistered(pool, token, creator, optical, nftId, timestamp)` —
  redundant with `IEventEmitter.MarketCreated` but EMITTED LOCALLY on the
  registry contract. Indexer typically uses the EventEmitter copy; keep
  this as a fall-back integrity check.

### Reads / Writes
- Reads: none (it IS the registry of record)
- Writes: `_tokenToPool`, `_poolToNftId`, `_creatorToPools[creator].push(pool)`,
  `_poolMetadata[pool]`, `_registeredPools[pool] = true`, `_allPools.push(pool)`

### Indexer notes
- `_creatorToPools` and `_allPools` arrays grow unbounded — paginate with
  `getAllPools(offset, limit)` if back-filling, but prefer reading from the
  EventEmitter `MarketCreated` history (faster + bounded by block range).
- `getPoolMetadata` is the canonical "is this a real pool?" check. Off-chain
  services (metadata, users, chat) currently query this via the indexer's
  Postgres mirror, NOT via direct RPC.


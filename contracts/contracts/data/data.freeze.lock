## FeeAccumulator

- **ABI:** `backend/deployments/abis/FeeAccumulator.json` (impl ABI)
       and `backend/deployments/abis/IFeeAccumulator.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#FeeAccumulator_proxy` —
  `0x5C3A7A87eB2DfC965F2764E28524FE77c0003810`
- **Address impl:** `paxeer-network-addresses.json#FeeAccumulator_impl` —
  `0x5d951A3910105C235Dde0eD125f062195e6C295d`
- **Prev impl:** `paxeer-network-addresses.json#FeeAccumulator_impl_prev`
- **Pattern:** UUPS proxy + ReentrancyGuard. Multiple roles (see below).
- **DEAD address:** `0x000000000000000000000000000000000000dEaD`

### Roles
| Role                     | Purpose                                                                                | Holders                          |
| ------------------------ | -------------------------------------------------------------------------------------- | -------------------------------- |
| `DEFAULT_ADMIN_ROLE`     | Setters, UUPS upgrade                                                                  | Timelock                         |
| `POOL_ROLE`              | `recordFee`, `recordOpticalSurplus`                                                    | Every registered pool (auto-granted on `authorizePool`) |
| `FEES_ROUTER_ROLE`       | `claim`, `burn`, `triggerAirdrop`, `sendLpRewards`                                     | `FeesRouter_proxy`               |
| `FACTORY_ROLE`           | `authorizePool` (grants `POOL_ROLE`)                                                   | `SidioraFactory_proxy`           |
| `OPTICAL_GRANTER_ROLE`   | `authorizeOptical` (grants `OPTICAL_CLAIM_ROLE`)                                       | `LaunchpadOpticalFactory_proxy`  |
| `OPTICAL_CLAIM_ROLE`     | `claimOpticalSurplus`                                                                  | Each `LaunchpadOptical` (per-pool, granted on creation) |

### Functions

External (writes):
- `recordFee(pool, feeAmount)` — `POOL_ROLE` only. Splits `feeAmount` into
  protocol cut (→ Treasury via `deposit`) and pool cut (→ accumulator).
  Calls optical `beforeFeeDistribution` hook to allow surplus diversion.
- `claim(pool, recipient)` → `amount` — `FEES_ROUTER_ROLE` only. Drains
  pool's accumulated USDL fees to `recipient`.
- `burn(pool)` → `amount` — `FEES_ROUTER_ROLE` only. Sends pool's fees to
  `DEAD_ADDRESS`.
- `triggerAirdrop(pool)` → `totalAmount` — `FEES_ROUTER_ROLE` only. Snapshots
  current accumulated fees as a new `epoch`. Holders pull individually via
  `claimAirdrop`.
- `claimAirdrop(pool, holder)` → `amount` — open call (any token holder of
  `pool.tokenAddress` can claim their pro-rata share for the current epoch).
  One claim per holder per epoch.
- `sendLpRewards(pool)` → `amount` — `FEES_ROUTER_ROLE` only. Transfers
  fees back into the pool's USDL reserve. The downstream `syncReserves` call
  on the pool is the responsibility of `FeesRouter`.
- `authorizePool(pool)` — `FACTORY_ROLE` only. Grants `POOL_ROLE`.
- `recordOpticalSurplus(pool, amount)` — `POOL_ROLE` only. Manual surplus
  attribution (rarely used; the inline path via `beforeFeeDistribution` in
  `recordFee` is the primary surplus accrual).
- `claimOpticalSurplus(pool, amount, recipient)` — `OPTICAL_CLAIM_ROLE`
  only. Used by `LaunchpadOptical.claimCapital`.
- `authorizeOptical(optical)` — `OPTICAL_GRANTER_ROLE` only. Grants
  `OPTICAL_CLAIM_ROLE` to a freshly-deployed optical.

Admin:
- `initialize(protocolConfig, treasury, poolRegistry, eventEmitter, usdl, admin)`
- UUPS `_authorizeUpgrade`

Views:
- `getAccumulatedFees(pool)` → `uint256`
- `getProtocolFeesPending()` → `uint256`
- `getAirdropBalance(pool)` → `uint256`
- `getLpRewardsBalance(pool)` → `uint256` (note: not actually written to in
  current impl — read with caution; verify against on-chain state)
- `getAirdropEpoch(pool)` → `uint256`
- `hasClaimedAirdrop(pool, holder, epoch)` → `bool`
- `getOpticalSurplus(pool)` → `uint256`
- Public: `protocolConfig`, `treasury`, `poolRegistry`, `eventEmitter`, `usdlAddress`

### Events to index (local, NOT routed through EventEmitter)
- `FeeRecorded(pool, feeAmount, protocolCut, poolCut)`
- `FeesClaimed(pool, recipient, amount)` — strategy=0 (CLAIM)
- `FeesBurned(pool, amount)` — strategy=1 (BURN)
- `AirdropTriggered(pool, totalAmount, epoch)` — strategy=2 trigger phase
- `AirdropClaimed(pool, holder, amount, epoch)` — per-holder claim
- `LpRewardsSent(pool, amount)` — strategy=3
- `OpticalSurplusRecorded(pool, amount)` — surplus accrual
- `OpticalSurplusClaimed(pool, recipient, amount)` — team capital draw

NOTE: `IEventEmitter.FeeRecorded` and `FeeDistributed` ALSO fire (from the
pool / FeesRouter / FeeAccumulator path) — these are richer (carry
`poolId, nftId, strategy, recipient`) and are the primary index.

### Reads / Writes
- Reads: `IProtocolConfig.protocolFeeBps`, `IPoolRegistry.getPoolMetadata` (for
  optical address), `IOpticalFee.{getFlags, beforeFeeDistribution}`, ERC20
  `balanceOf` and `totalSupply` for airdrop pro-rata.
- Writes: `_accumulatedFees[pool]`, `_protocolFeesPending`, `_airdropBalance`,
  `_airdropEpoch`, `_airdropEpochAmount`, `_airdropClaimed`, `_lpRewardsBalance`,
  `_opticalSurplus`. USDL `safeTransfer` to recipient/treasury/dead/pool.
  `ITreasury.deposit` (with prior `safeApprove`).

### Indexer notes
- Airdrop pro-rata is computed **at claim time** against `holderBalance /
  totalSupply` on `IPoolRegistry.getPoolMetadata(pool).token`. This means
  late claimers can change their share by acquiring more tokens. Indexer
  should NOT pre-compute "expected airdrop per holder at trigger time" — it
  is only resolvable post-claim.
- `_lpRewardsBalance` is exposed via `getLpRewardsBalance` but the current
  impl does NOT update it inside `sendLpRewards` (only zeros `_accumulatedFees`).
  The view is misleading — surface this in stats as "0 unless explicitly set
  by an upgrade". Treat `LpRewardsSent` as the source of truth.
- Strategy semantics:
  - `0 CLAIM`        → `claim()`
  - `1 BURN`         → `burn()`
  - `2 AIRDROP`      → `triggerAirdrop()` then per-holder `claimAirdrop()`
  - `3 LP_REWARDS`   → `sendLpRewards()` + `pool.syncReserves()`
  Each path emits both a local event AND an `IEventEmitter.FeeDistributed`
  via `FeesRouter`.


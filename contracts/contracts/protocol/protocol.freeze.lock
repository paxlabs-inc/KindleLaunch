## Coverage caveats
- This freeze locks the on-chain SURFACE only. The ADMIN→Timelock-only
  transition for PECOR + Meta-AG is in
  `paxeer-network-addresses.json#_meta_pecor.wiringPending = ["TRANSFER_ADMIN_TO_TIMELOCK"]`.
  Until that step lands, every meta-ag UUPS upgrade can bypass Timelock —
  surface this as a security warning until the wiring closes.
- `GovernanceModule.adminModeActive` is currently TRUE (irreversibly toggle
  to FALSE before SID full decentralization). Surface its state on every
  governance-related dashboard.

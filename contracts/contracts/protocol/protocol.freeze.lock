## Timelock

- **ABI:** `backend/deployments/abis/Timelock.json`
- **Address:** `paxeer-network-addresses.json#Timelock` —
  `0xEc2B7b640469607A45615385e713e656B7e667b9`
- **Pattern:** IMMUTABLE (NOT upgradeable). Trust anchor.
- **minDelay:** `paxeer-network-addresses.json#_meta.timelockDelay = 172800`
  (48 hours). Hardcoded at deploy.
- **proposer:** `GovernanceModule_proxy` (queues passed proposals)
- **guardian:** Initial deployer (`paxeer-network-addresses.json#_meta.guardian` =
  `0xfc263db0dd9087874B0B5c388d50704B83138F9B`)

### Functions

External:
- `queueTransaction(target, value, data, eta)` → `txHash` — proposer only.
  Reverts on `eta < block.timestamp + minDelay`. Reverts on duplicate hash.
- `executeTransaction(target, value, data, eta)` → `bytes` — anyone may call
  AFTER `block.timestamp >= eta`. Performs `target.call{value}(data)`. Wipes
  the queued flag before executing (CEI ordering).
- `cancelTransaction(target, value, data, eta)` — guardian only. Cancels a
  queued tx without executing.
- `setProposer(newProposer)` — current proposer only.
- `setGuardian(newGuardian)` — current guardian only.

Views:
- `minDelay()` (immutable)
- `proposer()`, `guardian()`
- `queuedTransactions(txHash)` → `bool`
- `getMinDelay()` → `uint256`
- `receive()` payable — accepts ETH/native pax for `value` payouts

### Events to index
- `TransactionQueued(txHash, target, value, data, eta)`
- `TransactionExecuted(txHash, target, value, data, eta)`
- `TransactionCancelled(txHash)`
- `ProposerChanged(oldProposer, newProposer)`
- `GuardianChanged(oldGuardian, newGuardian)`

### Reads / Writes
- Reads: nothing external
- Writes: `queuedTransactions[txHash]`, `proposer`, `guardian`. Calls
  `target.call{value}(data)` on execute (untrusted external call —
  `success == false` reverts the entire tx).

### Indexer notes
- This is the SECURITY MIRROR — every protocol-level admin change in the
  ecosystem produces a `TransactionQueued → TransactionExecuted` pair.
  The decoder must dispatch on the `target` and `data` selector to know
  which contract is being mutated (e.g. UUPS `upgradeToAndCall(addr,bytes)`,
  `ProtocolConfig.setBaseFeeBps(uint256)`, `OracleHub.setPrimaryOracle(addr)`).
- `txHash = keccak256(abi.encode(target, value, data, eta))` — deterministic
  identifier; same hash collides on a re-queue (intentional).
- `data` field is large (bytes) and copied verbatim to the event. Index it
  truncated for searchability + store the full raw log for replay.


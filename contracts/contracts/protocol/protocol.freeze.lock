## GovernanceModule

- **ABI:** `backend/deployments/abis/GovernanceModule.json`
- **Address proxy:** `paxeer-network-addresses.json#GovernanceModule_proxy` —
  `0xAA154A446f18E80E70b53357597E40CDD1D07E37`
- **Address impl:** `paxeer-network-addresses.json#GovernanceModule_impl` —
  `0xe955b10d82e1692A14Bd361366f55d7E9d405Bbd`
- **Pattern:** UUPS proxy. Two modes: ADMIN-bypass (initial) and full
  SID-token weighted voting. `adminModeActive` is irreversibly flipped off
  by `deactivateAdminMode()`.
- **votingToken:** SID — `paxeer-network-addresses.json#tokens.SID =
  0x86949e4CdB89496490890B67C9cfF63eD8efB4b1`

### Functions

External (writes):
- `propose(targets[], values[], calldatas[], description)` → `proposalId` —
  caller must hold ≥ `proposalThreshold` SID. Voting starts at `block.number+1`
  and runs for `votingPeriod` blocks.
- `castVote(proposalId, support)` — one vote per (proposalId, voter).
  Weight = SID balance at call time (NOT a snapshot — see indexer note).
- `execute(proposalId, eta)` — after voting ends. Requires `forVotes >=
  quorumVotes` AND `forVotes > againstVotes`. Queues every action via
  `Timelock.queueTransaction`.
- `cancel(proposalId)` — proposer or `ADMIN_ROLE` (pre-execution).
- `adminExecute(target, value, data, eta)` — `ADMIN_ROLE` only and ONLY if
  `adminModeActive`. Bypasses voting; queues directly via Timelock.
- `deactivateAdminMode()` — `ADMIN_ROLE` only. Irreversible.

Admin:
- `initialize(votingToken, timelock, admin, proposalThreshold, votingPeriod, quorumVotes)`
- UUPS `_authorizeUpgrade`

Views:
- `proposals(proposalId)` → public Proposal struct
- `hasVoted(proposalId, account)` → `bool`
- `voteSnapshot(proposalId, account)` → `uint256` (balance at vote time)
- `getProposalState(proposalId)` → enum `ProposalState{Pending,Active,Defeated,Succeeded,Queued,Executed,Cancelled}`
- `votingToken()`, `timelock()`, `proposalThreshold()`, `votingPeriod()`,
  `quorumVotes()`, `proposalCount()`, `adminModeActive()`

### Events to index
- `ProposalCreated(proposalId, proposer, description)`
- `VoteCast(proposalId, voter, support, weight)`
- `ProposalExecuted(proposalId)`
- `ProposalCancelled(proposalId)`
- `AdminModeDeactivated()` — one-shot, irreversible. Critical signal for
  the frontend to retire admin-only UI surfaces.

### Reads / Writes
- Reads: `votingToken.balanceOf(account)` (NOT a checkpointed snapshot —
  voters can split-and-vote with multiple wallets if they transfer SID
  between casts).
- Writes: `proposals[id]`, `hasVoted`, `voteSnapshot`. Calls
  `ITimelockQueue.queueTransaction(...)` per action on execute.

### Indexer notes
- `getProposalState` is computed on-the-fly from block.number — index it
  by storing `endBlock`, `forVotes`, `againstVotes`, `executed`, `cancelled`
  and recompute state in the API layer. Do NOT cache the enum result.
- Vote weight is "balance at vote-cast time", not a snapshot at proposal
  creation. This means SID-buying-after-proposal is a vote-buying vector
  that the indexer should surface (alert on rapid SID transfers + vote
  patterns within a single proposal window).
- `description` is a free-form string and may contain off-chain metadata
  (Discord links, IPFS hashes). Index full-text.


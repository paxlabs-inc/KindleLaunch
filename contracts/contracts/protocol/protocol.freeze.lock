## ProtocolConfig

- **ABI:** `backend/deployments/abis/ProtocolConfig.json` (impl)
       and `backend/deployments/abis/IProtocolConfig.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#ProtocolConfig_proxy` —
  `0x325e6Fb9c3505A35785365674089aEf8497C697B`
- **Address impl:** `paxeer-network-addresses.json#ProtocolConfig_impl` —
  `0xC826788820FB4310B60337Db127261C744D37827`
- **Pattern:** UUPS proxy. Single source of truth for global parameters.
- **USDL:** `paxeer-network-addresses.json#tokens.USDL =
  0x7c69c84daAEe90B21eeCABDb8f0387897E9B7B37`

### Initial values (set in `initialize`, mutable via setters)
| Parameter              | Default                                                |
| ---------------------- | ------------------------------------------------------ |
| `virtualUsdlDefault`   | `10_000e6` (10,000 USDL)                               |
| `virtualTokenDefault`  | `1_000_000_000e6` (1B tokens at 6 decimals)            |
| `minFeeBps`            | `10` (0.10%)                                           |
| `maxFeeBps`            | `300` (3.00%)                                          |
| `baseFeeBps`           | `30` (0.30%)                                           |
| `protocolFeeBps`       | `1000` (10% of pool fees → Treasury)                   |
| `feeDecayRate`         | `500`                                                  |
| `volatilityWeight`     | `100`                                                  |
| `concentrationWeight`  | `100`                                                  |
| `creationFee`          | `100e6` (100 USDL)                                     |

### Functions

External (admin-only setters, `DEFAULT_ADMIN_ROLE` = Timelock):
- `setBaseFeeBps(uint256)` — must be ≤ `maxFeeBps`
- `setProtocolFeeBps(uint256)` — must be ≤ 5000 (max 50%)
- `setCreationFee(uint256)`
- `setFeeWeights(decayRate, volWeight, concWeight)`
- `setVirtualDefaults(virtualUsdl, virtualToken)`
- `initialize(usdl, eventEmitter, admin)`
- UUPS `_authorizeUpgrade`

Views (every parameter is `public override`):
- `usdlAddress()`, `virtualUsdlDefault()`, `virtualTokenDefault()`,
  `minFeeBps()`, `maxFeeBps()`, `baseFeeBps()`, `protocolFeeBps()`,
  `feeDecayRate()`, `volatilityWeight()`, `concentrationWeight()`,
  `creationFee()`, `eventEmitter()`

### Events to index (routed through `IEventEmitter.ConfigUpdated`)
Each setter emits one or more `ConfigUpdated(keyHash, oldValue, newValue, ts, blk)`
events. Key hashes:
- `keccak256("baseFeeBps")`
- `keccak256("protocolFeeBps")`
- `keccak256("creationFee")`
- `keccak256("feeDecayRate")`
- `keccak256("volatilityWeight")`
- `keccak256("concentrationWeight")`
- `keccak256("virtualUsdlDefault")`
- `keccak256("virtualTokenDefault")`

### Reads / Writes
- Reads: nothing external
- Writes: each parameter slot, then calls `IEventEmitter.emitConfigUpdated`

### Indexer notes
- `setFeeWeights` and `setVirtualDefaults` emit MULTIPLE `ConfigUpdated`
  events from a single tx (one per parameter). Indexer should treat them as
  atomic — group by `txHash`.
- `protocolFeeBps` is the protocol's fee revenue rate. Treasury accrual rate
  = `Σ(swap.fee * protocolFeeBps / 10000)` over time.
- These params drive `SidioraPool._calculateFee` via `FeeLib.calculateDynamicFee`
  on every swap. A `ConfigUpdated(baseFeeBps,...)` invalidates any cached
  fee predictions.


## Treasury

- **ABI:** `backend/deployments/abis/Treasury.json` (impl)
       and `backend/deployments/abis/ITreasury.json` (interface)
- **Address proxy:** `paxeer-network-addresses.json#Treasury_proxy` —
  `0xe3705EaC51000F40e44D8039DF394f8b8FBAFaA3`
- **Address impl:** `paxeer-network-addresses.json#Treasury_impl` —
  `0xc72eD2E7422290b0D6ae6FbBf461D8e2c4820A62`
- **Pattern:** UUPS proxy. `DEPOSITOR_ROLE` granted to `FeeAccumulator_proxy`.
  Also wired as `feeCollector` for PECOR engine
  (`paxeer-network-addresses.json#_meta_pecor.feeCollector`).

### Functions

External (writes):
- `deposit(token, amount)` — `DEPOSITOR_ROLE` only. Pulls `amount` of `token`
  from caller via `safeTransferFrom`. Caller must have approved Treasury.
- `withdraw(token, to, amount)` — `DEFAULT_ADMIN_ROLE` (Timelock) only.

Admin:
- `initialize(eventEmitter, admin)`
- UUPS `_authorizeUpgrade`

Views:
- `getBalance(token)` → `uint256` (internal accounting, NOT raw ERC20
  balance — the two should match unless someone forces tokens via
  `transfer` directly to Treasury, in which case those become unaccounted)

### Events to index
- `Deposited(token, depositor, amount)`
- `Withdrawn(token, recipient, amount)`

### Reads / Writes
- Reads: nothing external
- Writes: `_balances[token]`. ERC20 `safeTransferFrom` (deposit) and
  `safeTransfer` (withdraw).

### Indexer notes
- Treasury accounting uses an internal map. Direct ERC20 `Transfer` events
  to Treasury that bypass `deposit()` are NOT reflected in `getBalance`.
  Reconciler should periodically diff `getBalance(token) vs ERC20.balanceOf(treasury)`
  and surface positive deltas as "untracked treasury revenue".
- `feeCollector` for the PECOR engine flows here too — Treasury is the
  unified protocol treasury for both Launchpad fees (via FeeAccumulator
  protocol cut) and PECOR engine swap fees (via direct collector route in
  PECOR.collectFees).


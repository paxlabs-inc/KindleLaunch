## Wiring + security notes
- `_meta_pecor.wiringPending = ["TRANSFER_ADMIN_TO_TIMELOCK"]` — until that closes, deployer (`0xfc263db0dd9087874B0B5c388d50704B83138F9B`) retains DEFAULT_ADMIN_ROLE on every meta-ag UUPS proxy. Surface this in ops dashboards as "admin transition pending".
- `_meta_pecor.deployedAt = 2026-04-25T05:13:00Z`. Storage layout baselines committed under `storage-layout/meta-ag/` in `/root/sidiora-contracts` (verify mirroring into this monorepo before any upgrade).
- All PECOR + Meta-AG swap paths gated by OracleHub + PriceOracle liveness — `wiringDone` registers ONLY USDL and WPAX. Adding new tokens is a 4-step Timelock procedure: PriceOracle.registerToken → Vault.registerToken → adapter attestation → optional MetaAGRouter adapter registration.

## Coverage caveats
- This freeze locks the on-chain SURFACE only. Behavioral edge cases (oracle circuit-breaker race conditions, adapter approval failures, FoT token interactions) are spec-bound — see `docs/architecture/pecor-sidiora-aggregator-spec.md` and `commit-alpha.pax` for canonical mainnet wiring sequence.
- Per-contract function lists derive from interface files; verify against impl ABI in `backend/deployments/abis/*.json` before encoding calls (some impls expose additional public state that's not in the interface).

## MetaAGRouter  (router/)

- **ABI:** `backend/deployments/abis/MetaAGRouter.json` + `IMetaAGRouter.json`
- **Address proxy:** `paxeer-network-addresses.json#MetaAGRouter_proxy` —
  `0x732ADb61D2a7a05cC52E8a54cdddB818703F6449`
- **Address impl:** `paxeer-network-addresses.json#MetaAGRouter_impl`
- **Pattern:** UUPS + Pausable + ReentrancyGuard. Spec §7.8. Storage: adapter
  map + sanity config + `__gap[50]`.
- **Registered adapters:** VaultAdapter, SidioraAdapter (per `_meta_pecor.wiringDone`).
- **Sanity:** `_meta_pecor.oracleDeviationBps = 500` (5% default).
- **Invariants:** S9 (zero-then-amount-then-zero approve dance), S10 (oracle sanity per swap output).

### Functions
- **Open writes:** `swapBestRoute(tokenIn, tokenOut, amountIn, amountOutMin, recipient, deadline)`, `swapViaAdapter(adapterId, ...)`, `swapMultiHop(HopParams[], amountIn, amountOutMin, deadline)`
- **Admin writes:** `initialize`, `registerAdapter(adapter)` (reads `adapter.adapterId()`), `deactivateAdapter(adapterId)`, `activateAdapter(adapterId)`, `setOracleHub(hub)`, `setOracleSanityDeviation(bps)`, `setOracleSanityEnabled(enabled)`, `pause/unpause`, UUPS upgrade
- **Views:** `getBestQuote(tokenIn, tokenOut, amountIn)` → `(QuoteResult, adapterId)`, `getAllQuotes(...)`, `getAdapters()`, `getAdapter(id)`, `adapterCount()`, `isAdapterActive(id)`, `oracleHub()`, `maxOracleSanityDeviation()`, `oracleSanityEnabled()`

### Events to index
- `AdapterRegistered(adapterId, adapter, name)`, `AdapterDeactivated/Activated(adapterId)`
- `OracleHubUpdated(hub)`, `OracleSanityDeviationUpdated(bps)`, `OracleSanityEnabledUpdated(enabled)`
- `BestRouteSwap(user, tokenIn, tokenOut, amountIn, amountOut, adapterId)` — **PRIMARY user meta-ag swap event**
- `MultiHopSwap(user, tokenIn, tokenOut, amountIn, amountOut, hops)`
- `OracleSanityCheckFailed(tokenOut, expectedPrice, actualAmountOut, ...)` — **CRITICAL ALERT**

### Reads
- `IProtocolAdapter.{getQuote, executeSwap, supportsSwap}` per adapter; `IOracleHub.getPrice` for sanity; ERC20 `transferFrom` from user.

### Writes
- `_adapters[id]`, `_adapterIds[]`; sanity config; calls into adapters.

### Indexer notes
- For "all user swaps in protocol", UNION:
  - `EventEmitter.Swap` (sender=user, NOT sender=SidioraAdapter)
  - `MetaAGRouter.BestRouteSwap`
  - `MetaAGRouter.MultiHopSwap`
- Multi-hop emits ONE `MultiHopSwap` plus N `BestRouteSwap`. Dedupe — user-facing entity is the MultiHop; per-hop BestRoutes are intermediates.
- `OracleSanityCheckFailed` = swap REVERTED for sanity. Repeated failures may indicate adapter manipulation or oracle desync.


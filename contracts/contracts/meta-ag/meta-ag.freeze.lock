  `paxeer-network-addresses.json` is one of these.

### Functions: `constructor(implementation, initData)`, `fallback`, `receive`.
### Notes: v2 helper bubbles up initializer custom errors verbatim. Pin assertions to inner errors (`ZeroAddress`, `InvalidConfig`), NOT a generic `InitializationFailed`.


- **Views:** `getQuote`, `supportsSwap`, `getSupportedPairs`, `getMaxInput`, `adapterId`, `adapterName`, `adapterVersion`

### Events: `SwapExecuted(adapterId, ...)`. ALSO causes `EventEmitter.Swap` emission on the underlying pool with `recipient = SidioraAdapter`.

### Reads / Writes
- Reads: `IPoolRegistry.getPoolByToken`, `ISidioraPool.{getReserves, getPriceSnapshots, creationTimestamp}`, `IProtocolConfig`, Sidiora `IQuoter`. Writes: ERC20 `safeApprove` (S9 dance), `Router.{buy, sell, swapTokenForToken}`, ERC20 transfer to recipient.

### Indexer notes
- The bridge between Meta-AG and live Launchpad. AMM `Swap.recipient = SidioraAdapter` — for "user trade history" use `MetaAGRouter.BestRouteSwap.user` as truth, NOT `Swap.sender/recipient`.


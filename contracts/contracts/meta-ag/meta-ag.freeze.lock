- `volumeUSD` computed at trade-time via OracleHub. If oracle was stale/zero at that moment, `volumeUSD = 0` — DO NOT silently drop; record and surface as "missing volume attribution".
- `DailyStatsSnapshot` fires on first interaction past day-rollover OR via `forceDaySnapshot()`. Use as authoritative daily aggregate (avoids drift from local computation).


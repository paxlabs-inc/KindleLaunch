## BuybackBurnOptical

- **ABI:** `backend/deployments/abis/BuybackBurnOptical.json`
- **Address:** `paxeer-network-addresses.json#BuybackBurnOptical` —
  `0x596467B82722dba67b6ACb0a7dc83B530a4C90BD`
- **Pattern:** Immutable. Owner-driven buyback execution flag.
- **Hook:** `BEFORE_FEE_DISTRIBUTION` only (flag `4`).
- **Cap:** `buybackBps ≤ 5000` (50%) — enforced at construction.
- **DEAD address:** `0x000000000000000000000000000000000000dEaD`

### Functions

External:
- `beforeFeeDistribution(pool, feeAmount)` → `adjustedFee` —
  diverts `feeAmount * buybackBps / 10000` into `accumulatedUsdl[pool]`
  and emits `BuybackAccumulated`. Returns reduced fee.
- `markBuybackExecuted(pool)` — owner-only. Zeros `accumulatedUsdl[pool]`,
  emits `BuybackExecuted`. Off-chain/Router process actually performs the
  buy + burn (this contract just records the intent).

Views:
- `buybackBps()` (immutable)
- `accumulatedUsdl(pool)` → `uint256`
- `getAccumulatedUsdl(pool)` → `uint256`
- `getFlags()` → `uint8` (`4`)

### Events to index (local)
- `BuybackAccumulated(pool, amount)`
- `BuybackExecuted(pool, usdlUsed)`

### Reads / Writes
- Reads: nothing external
- Writes: `accumulatedUsdl[pool]`. Note: this contract does NOT itself
  hold USDL — the surplus stays in `FeeAccumulator._opticalSurplus[pool]`
  but BuybackBurnOptical does NOT have `OPTICAL_CLAIM_ROLE` granted (the
  factory-deployed LaunchpadOptical does, but BuybackBurnOptical is a
  pre-deployed singleton). VERIFY: surplus is stranded unless the role is
  manually granted, OR the design intent is that `markBuybackExecuted` is
  paired with an off-chain Router call that buys back (the `accumulatedUsdl`
  here is purely accounting).

### Indexer notes
- Surface `BuybackAccumulated` summed per pool as "pending buyback budget".
  Surface `BuybackExecuted` as the realization signal. The actual on-chain
  buyback Tx is NOT inside this contract.


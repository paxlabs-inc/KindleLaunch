## Coverage caveats
- This freeze locks the on-chain SURFACE only.
- Pool's `optical` field can be `address(0)` (no optical) — that pool
  emits NO `OpticalExecuted` events. Still index it normally.
- Each optical type can be deployed multiple times with different
  parameters — the addresses in `paxeer-network-addresses.json` are
  the ONE pre-deployed canonical singleton per preset that frontend
  templates point creators at; a creator may deploy their own variant
  with `new` (any address implementing IOptical works as a pool's
  `optical`).
- `LaunchpadOptical` instances are created on-demand and are NOT in the
  paxeer-network-addresses.json file — discover via Factory events.

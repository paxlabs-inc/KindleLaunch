## TaxOptical

- **ABI:** `backend/deployments/abis/TaxOptical.json`
- **Address:** `paxeer-network-addresses.json#TaxOptical` —
  `0xaaA80699C008e34d537Bb0C8E24bE6f69b5cd9F2`
- **Pattern:** Immutable. Pure tax surcharge via amountDelta.
- **Hook:** `BEFORE_SWAP` only (flag `1`).
- **Cap:** `MAX_TAX_BPS = 1000` (10%) — enforced at construction.

### Functions

External:
- `beforeSwap(_, _, isBuy, amountIn)` (view) → `(true, -taxAmount)` where
  `taxAmount = amountIn * (isBuy ? buyTaxBps : sellTaxBps) / 10000`. Pool
  applies the negative delta to reduce effective `amountIn`. The taxed
  amount stays in the pool (deepens liquidity).

Views:
- `buyTaxBps()`, `sellTaxBps()` (immutables)
- `MAX_TAX_BPS()` constant `1000`
- `getFlags()` → `uint8` (`1`)

### Events: NONE.
### Reads / Writes: NONE.


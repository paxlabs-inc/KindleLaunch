## Group Identity
- **Group:** opticals
- **Path:** smart-contracts/contracts/opticals/
- **Contracts:**
  - `BaseOptical.sol` — abstract base (no deployed instance)
  - `OpticalRegistry.sol` — UUPS registry of approved opticals
  - `LaunchpadOpticalFactory.sol` — UUPS factory for project-specific opticals
  - presets:
    - `AntiSnipeOptical.sol`
    - `BuybackBurnOptical.sol`
    - `CooldownOptical.sol`
    - `MaxWalletOptical.sol`
    - `TaxOptical.sol`
    - `LaunchpadOptical.sol` (deployed per-project via factory; not pre-deployed)
- **Language:** Solidity ^0.8.24 (LicenseRef-Paxlabs-HyperPax-OS-Protocol)
- **Role:** Pluggable per-pool hooks invoked by `SidioraPool.swap` and
  `FeeAccumulator.recordFee`. The 4-hook surface (`beforeSwap`, `afterSwap`,
  `beforeFeeDistribution`, `afterFeeDistribution`) lets pool creators add
  protections (anti-snipe, cooldown, max-wallet) and economic primitives
  (tax, buyback-burn, launchpad vesting + capital raise).
- **Hook flags (uint8 BitFlag):**
  - `BEFORE_SWAP = 1`
  - `AFTER_SWAP  = 2`
  - `BEFORE_FEE_DISTRIBUTION = 4`
  - `AFTER_FEE_DISTRIBUTION  = 8`
- **All preset opticals are IMMUTABLE** — once deployed, parameters are
  encoded in `immutable` slots and cannot be changed. Replace by deploying
  a new optical and migrating projects (no on-chain migration tooling).


## AntiSnipeOptical

- **ABI:** `backend/deployments/abis/AntiSnipeOptical.json`
- **Address (singleton, pre-deployed):**
  `paxeer-network-addresses.json#AntiSnipeOptical` —
  `0x2235a03cC711bb384Ff42CcB7c6B727612bbCBE8`
- **Pattern:** Immutable. Per-pool state via `poolCreationBlock` map.
- **Hook:** `BEFORE_SWAP` only (flag `1`).

### Functions

External:
- `registerPool(pool)` — open. Records `poolCreationBlock[pool]` on first call.
- `beforeSwap(pool, sender, isBuy, amountIn)` → `(proceed, amountDelta)` —
  blocks BUYS exceeding `(effectiveUsdl * maxBuyBps / 10000)` while
  `block.number ≤ creationBlock + protectionBlocks`. Sells unaffected.

Views:
- `maxBuyBps()`, `protectionBlocks()` (immutables)
- `poolCreationBlock(pool)` → `uint256`
- `getFlags()` → `uint8` (constant `1`)

### Events
- NONE locally. Pool emits `OpticalExecuted` via EventEmitter on block.

### Reads
- `pool.getReserves()` for `effectiveUsdl` calculation

### Writes
- `poolCreationBlock[pool]` (one-shot per pool)

### Indexer notes
- Indexer should call `registerPool(pool)` programmatically (or rely on a
  user / keeper to call it) — without that, this optical does NOTHING.
  Surface in dashboards: "AntiSnipeOptical attached but not registered".


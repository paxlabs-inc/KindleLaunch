## LaunchpadOpticalFactory

- **ABI:** `backend/deployments/abis/LaunchpadOpticalFactory.json` (if
  generated; verify in `backend/deployments/abis/index.json`)
- **Address proxy:** `paxeer-network-addresses.json#LaunchpadOpticalFactory_proxy` —
  `0x385198712E5B288d64c3E1D3cb91bBeFD7B77b60`
- **Address impl:** `paxeer-network-addresses.json#LaunchpadOpticalFactory_impl` —
  `0x660b5Aa3bc80490ED8475d7766658318604a55AC`
- **Pattern:** UUPS proxy. Self-service factory. Holds `OPTICAL_GRANTER_ROLE`
  on `FeeAccumulator_proxy`.

### Functions

External (open):
- `createLaunchpadOptical(teamWallets[], cliffDuration, vestingDuration,
   capitalRaiseBps, capitalRaiseDuration, teamClaimAddress)` → `optical` —
  Anyone can call. Deploys a new immutable `LaunchpadOptical`, then calls
  `FeeAccumulator.authorizeOptical(optical)` to grant `OPTICAL_CLAIM_ROLE`
  to the new instance.
  Caller (`msg.sender`) is recorded as both `owner` and `creator` (auto-vested).
  `capitalRaiseBps ≤ 1000`, `cliffDuration ≤ 365d`, `vestingDuration ≤ 1095d`,
  `capitalRaiseDuration ≤ 365d`, `teamWallets.length ≤ 20`.

Admin:
- `initialize(poolRegistry, feeAccumulator, opticalRegistry, admin)`
- UUPS `_authorizeUpgrade`

Views:
- `getOpticalsByCreator(creator)` → `address[]`
- `getDeployedCount()` → `uint256`
- `getAllOpticals(offset, limit)` → `address[]`
- `poolRegistry()`, `feeAccumulator()`, `opticalRegistry()`

### Events to index (local; NOT routed via EventEmitter)
- `LaunchpadOpticalCreated(optical, creator, teamClaimAddress,
   cliffDuration, vestingDuration, capitalRaiseBps, capitalRaiseDuration)`

### Reads
- Constructor of `LaunchpadOptical` validates `_creator`, `_teamClaimAddress`,
  `_feeAccumulator` non-zero and bounds.
- `IFeeAccumulator.authorizeOptical` (write call, granted via
  `OPTICAL_GRANTER_ROLE`).

### Writes
- Deploys new `LaunchpadOptical` (CREATE, not CREATE2 — address is
  block-order dependent, NOT deterministic).
- `_deployedOpticals.push(optical)`, `_creatorOpticals[msg.sender].push(optical)`
- Indirectly grants `OPTICAL_CLAIM_ROLE` on FeeAccumulator.

### Indexer notes
- Subscribe to `LaunchpadOpticalCreated` to discover all deployed launchpad
  opticals (no other discovery path exists — they aren't auto-registered
  in OpticalRegistry).
- The new optical's address is non-deterministic. The indexer must wait for
  the event to learn the address.


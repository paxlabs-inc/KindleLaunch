## LaunchpadOptical (per-project, deployed via factory)

- **Pattern:** Immutable. NOT pre-deployed; each project gets its own.
  Discover via `LaunchpadOpticalFactory.LaunchpadOpticalCreated` events.
- **Hooks used:** `BEFORE_SWAP | AFTER_SWAP | BEFORE_FEE_DISTRIBUTION = 7`
- **ABI:** Generated from `contracts/opticals/presets/LaunchpadOptical.sol`.
  Add to `backend/deployments/abis/` if not present.

### Functions

External (writes; called by pool / by team):
- `beforeSwap(pool, sender, isBuy, amountIn)` → `(proceed, amountDelta)` —
  pool-only. Records `poolStartTime` on first call. Enforces cliff lock and
  linear vesting on team-wallet sells.
- `afterSwap(pool, sender, isBuy, amountIn, amountOut)` — pool-only. Updates
  `tokensSold[pool][sender]` for vested wallets selling.
- `beforeFeeDistribution(pool, feeAmount)` → `adjustedFee` — FeeAccumulator-
  invoked. Diverts `capitalRaiseBps` to optical surplus while
  `block.timestamp - poolStartTime[pool] ≤ capitalRaiseDuration`.
- `claimCapital(pool)` — `teamClaimAddress`-only. Pulls accumulated USDL
  via `FeeAccumulator.claimOpticalSurplus` to `teamClaimAddress`.

Views:
- `getVestingInfo(pool, wallet)` → `(vested, cliffEnd, vestEnd, vestedAmount, sold, maxSellableNow)`
- `getCapitalRaiseInfo(pool)` → `(accumulated, totalRaisedAmount, raiseEndTime, isActive)`
- `isTeamWallet(wallet)` → `bool`
- `getFlags()` → `uint8` (constant `7`)
- Public immutables: `creator`, `teamClaimAddress`, `feeAccumulator`,
  `cliffDuration`, `vestingDuration`, `capitalRaiseBps`, `capitalRaiseDuration`,
  `teamWalletCount`, plus `MAX_*` constants.
- Public storage: `isVested(addr)`, `poolStartTime(pool)`, `tokensSold(pool,wallet)`,
  `accumulatedUsdl(pool)`, `totalRaised(pool)`.

### Events to index (local)
- `PoolStartTimeRecorded(pool, startTime)` — first interaction (one per pool)
- `SellBlockedCliff(pool, sender, amountIn)` — failed sell during cliff
- `SellBlockedVesting(pool, sender, amountIn, maxSellable)` — over-vest sell
- `CapitalRaiseAccumulated(pool, amount, totalRaisedAmount)` — every fee div
- `CapitalRaiseClaimed(pool, amount, recipient)` — team capital draw

### Reads
- Pool: `pool.tokenAddress()` then `token.balanceOf(wallet)` for vesting math
- Calls into `IFeeAccumulator.claimOpticalSurplus`

### Writes
- `poolStartTime[pool]`, `tokensSold[pool][wallet]`,
  `accumulatedUsdl[pool]`, `totalRaised[pool]`

### Indexer notes
- The event fields here are richer than the canonical `OpticalExecuted` —
  index `LaunchpadOptical.*` events DIRECTLY for project dashboards.
- Vesting math is "originalAllocation = currentBalance + alreadySold" —
  the indexer must compute `originalAllocation` AT FIRST SELL TIME and
  cache it; later balance changes do not affect already-vested fractions.


- **ABI:** `backend/deployments/abis/MaxWalletOptical.json`
- **Address:** `paxeer-network-addresses.json#MaxWalletOptical` —
  `0xbc02402CD5385f5f67F0Dcc9b91C93eCF4107A7b`

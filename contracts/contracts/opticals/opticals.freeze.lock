## OpticalRegistry

- **ABI:** `backend/deployments/abis/OpticalRegistry.json`
- **Address proxy:** `paxeer-network-addresses.json#OpticalRegistry_proxy` —
  `0xA62b58fe655B45179449003279416575B7241449`
- **Address impl:** `paxeer-network-addresses.json#OpticalRegistry_impl` —
  `0x9cEB5828aA38495248710aF280B2C21CD48040E6`
- **Pattern:** UUPS proxy. **Trust-signaling only** — pools can use
  unregistered opticals; the registry just toggles a "verified" badge.

### Functions

External (admin-only writes):
- `registerOptical(optical, name, description, riskLevel, auditor)` —
  `DEFAULT_ADMIN_ROLE` only. `riskLevel` is 1–5.
- `deregisterOptical(optical)` — `DEFAULT_ADMIN_ROLE` only. Sets approved=false
  but DOES NOT remove from `_allOpticals` array (paginated view persists).
- `updateMetadata(optical, name, description, riskLevel, auditor)` —
  `DEFAULT_ADMIN_ROLE` only. Preserves `registeredAt`.

Admin:
- `initialize(eventEmitter, admin)`
- UUPS `_authorizeUpgrade`

Views:
- `isRegistered(optical)` → `bool`
- `getOpticalMetadata(optical)` → `OpticalMetadata{name, description, riskLevel, auditor, registeredAt}`
- `getAllOpticals(offset, limit)` → `address[]`
- `getOpticalCount()` → `uint256`
- `eventEmitter()` → `address`

### Events to index (local; NOT routed via EventEmitter)
- `OpticalRegistered(optical, name, riskLevel, timestamp)`
- `OpticalDeregistered(optical, timestamp)`
- `OpticalMetadataUpdated(optical, timestamp)`

### Reads / Writes
- Reads: nothing external.
- Writes: `_approved[optical]`, `_metadata[optical]`, `_allOpticals.push(optical)`.

### Indexer notes
- This registry is ADVISORY. A pool's `optical` field can point to ANY
  contract implementing `IOptical` — registration is a UI hint, not an
  enforcement.
- `_allOpticals` is append-only (deregistered entries persist in the array).
  Frontend should filter against `isRegistered(optical)` post-fetch.


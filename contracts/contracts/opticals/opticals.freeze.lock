## BaseOptical (abstract)

- **NOT DEPLOYED.** Inheritance base only. No address.
- Provides default no-op `beforeSwap/afterSwap/beforeFeeDistribution/afterFeeDistribution`.
- Provides `_isRegisteredPool(pool)` (staticcall to PoolRegistry) and
  `_getPoolReserves(pool)` (staticcall to pool).
- `onlyPool` modifier and `onlyOwner` modifier patterns.

